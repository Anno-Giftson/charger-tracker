<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Charger Borrower Tracker</title>

<style>

body{
font-family: 'Segoe UI', sans-serif;
margin:0;
background:linear-gradient(135deg,#4facfe,#00f2fe);
min-height:100vh;
color:#333;
}

.container{
max-width:1100px;
margin:auto;
padding:30px;
}

h1{
text-align:center;
color:white;
margin-bottom:30px;
}

.card{
background:white;
border-radius:12px;
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
margin-bottom:20px;
}

#search{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
margin-bottom:15px;
font-size:16px;
}

.borrower-btn{
padding:10px 14px;
margin:6px;
border:none;
border-radius:6px;
background:#4CAF50;
color:white;
cursor:pointer;
font-size:14px;
transition:.2s;
}

.borrower-btn:hover{
background:#3e8e41;
transform:scale(1.05);
}

.progress-bar{
width:100%;
background:#eee;
border-radius:8px;
overflow:hidden;
margin-top:10px;
}

.progress-fill{
height:20px;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
text-align:center;
font-size:12px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:left;
}

th{
background:#f4f4f4;
}

.status-returned{
color:green;
font-weight:bold;
}

.status-late{
color:orange;
font-weight:bold;
}

.status-verylate{
color:red;
font-weight:bold;
}

.status-extremelylate{
color:darkred;
font-weight:bold;
}

.status-borrowed{
color:#007bff;
font-weight:bold;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="container">

<h1>🔌 Charger Borrower Tracker</h1>

<div class="card">

<h2>Borrowers</h2>

<input id="search" placeholder="Search borrower name...">

<div id="borrowers">Loading borrowers...</div>

</div>

<div class="card hidden" id="profile">

<h2 id="borrower-name"></h2>

<p><strong>Credit Score:</strong> <span id="credit-score"></span>%</p>

<div class="progress-bar">
<div id="credit-progress" class="progress-fill">0%</div>
</div>

<h3>Loan History</h3>

<table>

<thead>
<tr>
<th>Borrow Date</th>
<th>Return Date</th>
<th>Status</th>
<th>Asked?</th>
</tr>
</thead>

<tbody id="loan-history"></tbody>

</table>

</div>

</div>

<script>

const SHEET_API_URL =
'https://script.google.com/macros/s/AKfycbxgHM2VbpX3QL0_aK2fHZda_p3NI-CDwvkvVuWBz2JEXs8grOsw51JSF29uwoutpPdOtg/exec';

let allData=[];

function formatDate(d){

if(!d) return '';

let date=new Date(d);

return date.toLocaleDateString()+" "+date.toLocaleTimeString();

}

function getStatusClass(status){

if(status==="Returned") return "status-returned";

if(status==="Late") return "status-late";

if(status==="Very Late") return "status-verylate";

if(status==="Extremely Late") return "status-extremelylate";

if(status==="Still Borrowed") return "status-borrowed";

return "";

}

async function fetchData(){

try{

let res=await fetch(SHEET_API_URL);

allData=await res.json();

populateBorrowers();

}catch(e){

document.getElementById("borrowers").innerText="Failed to load.";

console.error(e);

}

}

function populateBorrowers(){

let borrowersDiv=document.getElementById("borrowers");

borrowersDiv.innerHTML="";

let names=[...new Set(allData.map(r=>r["Borrower Name"]).filter(Boolean))];

names.sort();

names.forEach(name=>{

let btn=document.createElement("button");

btn.className="borrower-btn";

btn.innerText=name;

btn.onclick=()=>showProfile(name);

borrowersDiv.appendChild(btn);

});

}

function showProfile(name){

document.getElementById("profile").classList.remove("hidden");

document.getElementById("borrower-name").innerText=name;

let history=allData.filter(r=>r["Borrower Name"]===name);

let total=history.length;

let good=history.filter(r=>r["Status"]==="Returned" && (r["Asked?"]||"").toLowerCase()!=="yes").length;

let credit=total?Math.round((good/total)*100):100;

document.getElementById("credit-score").innerText=credit;

let bar=document.getElementById("credit-progress");

bar.style.width=credit+"%";

bar.innerText=credit+"%";

let tbody=document.getElementById("loan-history");

tbody.innerHTML="";

history.reverse().forEach(row=>{

let tr=document.createElement("tr");

let status=row["Status"]||"";

tr.innerHTML=`

<td>${formatDate(row["Borrow Date"])}</td>

<td>${formatDate(row["Return Date"])}</td>

<td class="${getStatusClass(status)}">${status}</td>

<td>${row["Asked?"]||""}</td>

`;

tbody.appendChild(tr);

});

}

document.getElementById("search").addEventListener("input",function(){

let value=this.value.toLowerCase();

let buttons=document.querySelectorAll(".borrower-btn");

buttons.forEach(btn=>{

btn.style.display=btn.innerText.toLowerCase().includes(value)?"inline-block":"none";

});

});

fetchData();

</script>

</body>
</html>
